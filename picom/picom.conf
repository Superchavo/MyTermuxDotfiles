backend = "xrender";
vsync = false;
shadow = true;
fading = true;
opaque-void = true;
shadow-exclude = [
    "class_g = 'plasmashell'",
    "class_g = 'Plasma'",
    "window_type = 'dock'",
    "window_type = 'desktop'"
];
blur-background-exclude = [
    "class_g = 'plasmashell'",
    "class_g = 'Plasma'",
    "window_type = 'dock'",
    "window_type = 'desktop'"
];
focus-exclude = [
    "class_g = 'plasmashell'",
    "class_g = 'Plasma'"
];
wintypes:
{
    tooltip = { fade = true; shadow = false; opacity = 1.0; focus = true; };
    dock = { shadow = false; fade = true; opacity = 1.0; }
    dnd = { shadow = true; fade = true; }
    popup_menu = { opacity = 1.0; shadow = true; fade = true; }
    dropdown_menu = { opacity = 1.0; shadow = true; fade = true; }
};
